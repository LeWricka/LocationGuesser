<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Maskable: fondo papel a sangre completa (Android lo recorta a su forma).
       La constelación vive en la "safe zone" central (~80%): escala menor y
       centrada para no perder nodos al recortar a círculo/squircle. -->
  <rect width="512" height="512" fill="#f6f7f9"/>
  <!-- Lienzo 24×24 escalado ×12 = 288px, centrado (offset 112) y subido un poco
       para centrar ópticamente la nube de nodos. -->
  <g transform="translate(112 136) scale(12)">
    <polyline points="4,17 9.5,11.5 14,15.5 17,7.5 20,12.5" stroke="#34506b" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.45" fill="none"/>
    <circle cx="4" cy="17" r="1.45" fill="#34506b"/>
    <circle cx="9.5" cy="11.5" r="1.45" fill="#34506b"/>
    <circle cx="14" cy="15.5" r="1.45" fill="#34506b"/>
    <circle cx="20" cy="12.5" r="1.45" fill="#34506b"/>
    <circle cx="17" cy="7.5" r="3.4" stroke="#34506b" stroke-width="1" stroke-opacity="0.5" fill="none"/>
    <circle cx="17" cy="7.5" r="2" fill="#34506b"/>
  </g>
</svg>
