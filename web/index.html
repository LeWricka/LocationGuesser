<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Marca "Momentu": favicon SVG vectorial (con respaldo en PNG para
         navegadores que no lo soporten) y apple-touch-icon para "añadir a inicio". -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA / pantalla de inicio: color de barra del navegador (--scene-bg, el
         fondo de escena oscuro a sangre del icono "Cometa", issue #865) y
         comportamiento standalone en iOS. El <link rel="manifest"> lo inyecta
         vite-plugin-pwa en el build. -->
    <meta name="theme-color" content="#0b1016" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Momentu" />

    <!-- SEO / compartir: descripción cálida y breve de qué es la app. -->
    <meta
      name="description"
      content="Guarda los momentos de tu viaje para siempre y compártelos con tu gente. El reto: adivinar en el mapa dónde es cada foto."
    />

    <!-- Pistas de conexión temprana a los terceros del camino crítico: abre el
         handshake (DNS + TCP + TLS) en paralelo con el parseo del HTML, así la
         primera petición a cada host llega más rápido.
         - server.arcgisonline.com → tiles del globo de la home (preconnect).
         - *.supabase.co → datos/realtime/storage; el proyecto vive en un subdominio
           concreto, así que preconnect directo a él.
         - maps.googleapis.com / maps.gstatic.com → SDK de Maps/Street View; solo se
           usa en jugar/crear/viaje, no en la landing, por eso dns-prefetch (más
           barato) en vez de preconnect. -->
    <link rel="preconnect" href="https://server.arcgisonline.com" crossorigin />
    <link rel="preconnect" href="https://ykquigyjvgxisgdxryxr.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://maps.googleapis.com" />
    <link rel="dns-prefetch" href="https://maps.gstatic.com" />

    <!-- Precarga del peso de display más usado (Cormorant 500) para que los
         titulares no parpadeen al entrar (font-display: swap cubre el resto). -->
    <link rel="preload" href="/fonts/cormorant-500.woff2" as="font" type="font/woff2" crossorigin />
    <title>Momentu — comparte tus momentos de una forma diferente</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
