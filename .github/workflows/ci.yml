name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, types, test y build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Design lint (guardarrailes visuales)
        run: npm run design-lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  smoke:
    name: Smoke E2E (hermético)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # El smoke es HERMÉTICO: no hace login ni escribe en BD; solo comprueba que
      # la SPA monta y muestra el login. El cliente de Supabase se construye al
      # arrancar y exige las dos VITE_*, pero NO valida que sean reales: sirven
      # placeholders públicos. La pantalla de login no hace red. Sin secretos.
      - name: Smoke (solo el spec hermético)
        run: npx playwright test smoke
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
          VITE_ANALYTICS_DISABLED: 'true'

  create:
    name: Crear reto E2E (hermético)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # E2E HERMÉTICO del bucle de crear reto (#443/#456). Su config propia
      # (playwright.hermetic.config.ts) corre contra el BUILD de prod servido por
      # `vite preview` (sin StrictMode, como el usuario real). Los specs mockean
      # sesión + Supabase (REST/Storage) + Google Maps, así que NO hace login ni red
      # externa ni escribe en BD: bastan los placeholders VITE_* públicos. Caza las
      # regresiones del journey de crear (p.ej. #455: al soltar el pin, «Añadir Street
      # View» se volvía inalcanzable) que los unit tests no ven.
      - name: Crear reto (spec hermético)
        run: npm run e2e:create
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
          VITE_GOOGLE_MAPS_API_KEY: placeholder-maps-key
          VITE_ANALYTICS_DISABLED: 'true'

  a11y:
    name: Accesibilidad + viewports + integridad de esquina (hermético)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Guardarraíles HERMÉTICOS de la galería (GALLERY=1: fixtures, sin login ni red;
      # cada spec bloquea toda red externa). `npm run a11y` corre dos specs:
      #  - #396 accesibilidad: axe-core por pantalla a 390×844 (falla solo con violaciones
      #    serias/críticas NUEVAS vs. baseline) + no-overflow horizontal a 320px.
      #  - #415 integridad de esquina: la hoja (GlobeSheet) no deja asomar la escena oscura
      #    por sus esquinas redondeadas (muestreo de píxel en los triángulos de esquina a
      #    un viewport alto). Los placeholders VITE_* bastan (cliente Supabase falso).
      - name: Accesibilidad (axe) + overflow a 320px + integridad de esquina
        run: npm run a11y
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
          VITE_ANALYTICS_DISABLED: 'true'
